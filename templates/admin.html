<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request Feedback</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
    <div class="page">
        <div class="card">
            <h1>Request Feedback</h1>
            <p class="subtitle">Send a feedback request email.</p>

            <div class="button-row" style="margin-bottom: 20px;">
                <a href="/change-password" class="btn-secondary">Change Password</a>

                <form method="post" action="/logout">
                    <button type="submit" class="btn-secondary">Log out</button>
                </form>
            </div>

            {% if success_message %}
                <div class="success-message">{{ success_message }}</div>
            {% endif %}
            {% if error_message %}
                <div class="error-message">{{ error_message }}</div>
            {% endif %}

            <form id="reviewRequestForm" action="/request-feedback" method="post">
                <div class="form-group">
                    <label for="recipientEmail">Recipient email</label>
                    <input
                        type="email"
                        id="recipientEmail"
                        name="recipientEmail"
                        placeholder="name@example.com"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="identifier">Identifier</label>
                    <input
                        type="text"
                        id="identifier"
                        name="identifier"
                        placeholder="e.g. Client A / Project X / 2026-03-13"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="message">Email message</label>
                    <textarea
                        id="message"
                        name="message"
                        rows="6"
                        placeholder="Type the message that will appear above the feedback request..."
                    ></textarea>
                </div>

                <div class="button-row">
                    <button type="submit" class="btn-primary">Request Feedback</button>
                    <button type="button" id="previewButton" class="btn-secondary">Preview</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/static/js/admin.js"></script>
</body>
</html>
