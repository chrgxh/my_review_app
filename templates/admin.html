<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Review Admin</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
    <div class="page">
        <div class="card">
            <h1>Request a Review</h1>
            <p class="subtitle">Send a review request email to a guest.</p>

            <form id="reviewRequestForm">
                <div class="form-group">
                    <label for="recipientEmail">Recipient email</label>
                    <input
                        type="email"
                        id="recipientEmail"
                        name="recipientEmail"
                        placeholder="guest@example.com"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="identifier">Identifier</label>
                    <input
                        type="text"
                        id="identifier"
                        name="identifier"
                        placeholder="e.g. John Smith / Room 204 / 2026-03-13"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="message">Email message</label>
                    <textarea
                        id="message"
                        name="message"
                        rows="6"
                        placeholder="Type the message that will appear above the review request..."
                    ></textarea>
                </div>

                <button type="submit">Request Review</button>
            </form>
        </div>
    </div>

    <script src="/static/js/admin.js"></script>
</body>
</html>
