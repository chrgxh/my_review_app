<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
    <div class="auth-page">
        <div class="card feedback-message-card">
            <h1>{{ title }}</h1>

            <p class="message">{{ message }}</p>

            {% if show_review_link %}
                <div class="review-link-wrapper">
                    <a
                        href="{{ review_url }}"
                        target="_blank"
                        rel="noopener noreferrer"
                        class="btn btn-primary"
                    >
                        Review us here
                    </a>
                </div>
            {% endif %}
        </div>
    </div>
</body>
</html>
