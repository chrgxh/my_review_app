<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
    <div class="auth-page">
        <div class="card feedback-message-card">

            {% if logo_url %}
                <div class="brand-card-header">
                    <img
                        src="{{ logo_url }}"
                        alt="{{ business_name or 'Logo' }}"
                    >
                </div>
            {% endif %}

            <h1>{{ title }}</h1>

            <p class="message">{{ message }}</p>

            {% if show_review_link %}
                <div class="review-link-wrapper">
                    <a
                        href="{{ review_url }}"
                        target="_blank"
                        rel="noopener noreferrer"
                        class="btn btn-primary"
                    >
                        Review us here
                    </a>
                </div>
            {% endif %}

            {% if business_name %}
                <div class="brand-card-footer">
                    {{ business_name }}
                </div>
            {% endif %}

        </div>
    </div>
</body>
</html>
