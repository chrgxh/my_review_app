<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <style>
        body {
            margin: 0;
            padding: 32px 16px;
            background: #e9eff4;
            font-family: Arial, sans-serif;
            color: #1f2a37;
        }

        .page-wrapper {
            max-width: 680px;
            margin: 0 auto;
        }

        .card {
            background: #f8fbfd;
            border: 1px solid #d6e2ea;
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 8px 24px rgba(32, 55, 70, 0.08);
        }

        h1 {
            margin: 0 0 14px;
            font-size: 28px;
            color: #183142;
        }

        .message {
            margin: 0;
            color: #5f7383;
            font-size: 15px;
            line-height: 1.6;
        }

        .review-link-wrapper {
            margin-top: 24px;
        }

        .review-link {
            display: inline-block;
            background: #183142;
            color: #ffffff;
            text-decoration: none;
            padding: 14px 22px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
        }

        .review-link:hover {
            opacity: 0.95;
        }
    </style>
</head>
<body>
    <div class="page-wrapper">
        <div class="card">
            <h1>{{ title }}</h1>

            <p class="message">{{ message }}</p>

            {% if show_review_link %}
                <div class="review-link-wrapper">
                    <a
                        href="{{ review_url }}"
                        target="_blank"
                        rel="noopener noreferrer"
                        class="review-link"
                    >
                        Review us here
                    </a>
                </div>
            {% endif %}
        </div>
    </div>
</body>
</html>
