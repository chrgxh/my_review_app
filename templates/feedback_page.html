<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leave Feedback</title>
    <style>
        body {
            margin: 0;
            padding: 32px 16px;
            background: #e9eff4;
            font-family: Arial, sans-serif;
            color: #1f2a37;
        }

        .page-wrapper {
            max-width: 680px;
            margin: 0 auto;
        }

        .card {
            background: #f8fbfd;
            border: 1px solid #d6e2ea;
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 8px 24px rgba(32, 55, 70, 0.08);
        }

        h1 {
            margin: 0 0 12px;
            font-size: 28px;
            color: #183142;
        }

        .subtitle {
            margin-bottom: 24px;
            color: #5f7383;
            font-size: 15px;
            line-height: 1.5;
        }

        .section-title {
            margin: 0 0 14px;
            font-size: 18px;
            color: #27485a;
        }

        .score-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 28px;
        }

        .score-option input[type="radio"] {
            display: none;
        }

        .score-label {
            display: inline-block;
            min-width: 56px;
            padding: 14px 0;
            text-align: center;
            background: #6f93ab;
            color: #ffffff;
            border-radius: 10px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: 0.15s ease;
        }

        .score-option input[type="radio"]:checked + .score-label {
            background: #183142;
        }

        .score-label:hover {
            opacity: 0.9;
        }

        .comment-box {
            width: 100%;
            min-height: 140px;
            padding: 14px 16px;
            border: 1px solid #dbe5ec;
            border-radius: 12px;
            font-size: 15px;
            line-height: 1.5;
            resize: vertical;
            box-sizing: border-box;
            margin-bottom: 20px;
            font-family: Arial, sans-serif;
        }

        .submit-btn {
            display: inline-block;
            border: none;
            background: #183142;
            color: white;
            padding: 14px 22px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }

        .submit-btn:hover {
            opacity: 0.95;
        }

        .extra-link {
            margin-top: 22px;
            font-size: 14px;
            color: #5f7383;
        }

        .extra-link a {
            color: #183142;
            font-weight: 600;
            text-decoration: none;
        }

        .extra-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="page-wrapper">
        <div class="card">
            <h1>We’d love your feedback</h1>

            <div class="subtitle">
                Please rate your experience below. You can also leave an optional comment.
            </div>

            <form action="/submit-feedback" method="post">
                <input type="hidden" name="token" value="{{ token }}">

                <h2 class="section-title">Your score</h2>

                <div class="score-row">
                    <label class="score-option">
                        <input type="radio" name="score" value="1" {% if score == 1 %}checked{% endif %}>
                        <span class="score-label">1</span>
                    </label>

                    <label class="score-option">
                        <input type="radio" name="score" value="2" {% if score == 2 %}checked{% endif %}>
                        <span class="score-label">2</span>
                    </label>

                    <label class="score-option">
                        <input type="radio" name="score" value="3" {% if score == 3 %}checked{% endif %}>
                        <span class="score-label">3</span>
                    </label>

                    <label class="score-option">
                        <input type="radio" name="score" value="4" {% if score == 4 %}checked{% endif %}>
                        <span class="score-label">4</span>
                    </label>

                    <label class="score-option">
                        <input type="radio" name="score" value="5" {% if score == 5 %}checked{% endif %}>
                        <span class="score-label">5</span>
                    </label>

                    <label class="score-option">
                        <input type="radio" name="score" value="6" {% if score == 6 %}checked{% endif %}>
                        <span class="score-label">6</span>
                    </label>

                    <label class="score-option">
                        <input type="radio" name="score" value="7" {% if score == 7 %}checked{% endif %}>
                        <span class="score-label">7</span>
                    </label>

                    <label class="score-option">
                        <input type="radio" name="score" value="8" {% if score == 8 %}checked{% endif %}>
                        <span class="score-label">8</span>
                    </label>

                    <label class="score-option">
                        <input type="radio" name="score" value="9" {% if score == 9 %}checked{% endif %}>
                        <span class="score-label">9</span>
                    </label>

                    <label class="score-option">
                        <input type="radio" name="score" value="10" {% if score == 10 %}checked{% endif %}>
                        <span class="score-label">10</span>
                    </label>
                </div>

                <h2 class="section-title">Additional comments (optional)</h2>

                <textarea
                    name="comment"
                    class="comment-box"
                    placeholder="Tell us more about your experience..."
                ></textarea>

                <button type="submit" class="submit-btn">Submit feedback</button>
            </form>
        </div>
    </div>
</body>
</html>
