<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leave Feedback</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
    <div class="auth-page">
        <div class="card feedback-card">

            {% if logo_url %}
                <div class="brand-card-header">
                    <img
                        src="{{ logo_url }}"
                        alt="{{ business_name or 'Logo' }}"
                    >
                </div>
            {% endif %}

            <h1>We’d love your feedback</h1>

            <p class="subtitle">
                Please rate your experience below. You can also leave an optional comment.
            </p>

            <form action="/submit-feedback" method="post">
                <input type="hidden" name="token" value="{{ token }}">

                <h2 class="section-title">Your score</h2>

                <div class="score-scale-wrapper">
                    <div class="score-slider-row">
                        <input
                            id="score"
                            class="score-slider"
                            type="range"
                            name="score"
                            min="1"
                            max="10"
                            step="1"
                            value="{% if score %}{{ score }}{% else %}7{% endif %}"
                        >
                    </div>

                    <div class="score-ticks" aria-hidden="true">
                        <span>1</span>
                        <span>2</span>
                        <span>3</span>
                        <span>4</span>
                        <span>5</span>
                        <span>6</span>
                        <span>7</span>
                        <span>8</span>
                        <span>9</span>
                        <span>10</span>
                    </div>
                </div>

                <h2 class="section-title">Additional comments (optional)</h2>

                <div class="form-group">
                    <textarea
                        id="comment"
                        name="comment"
                        placeholder="Tell us more about your experience..."
                    >{% if comment %}{{ comment }}{% endif %}</textarea>
                </div>

                <div class="button-row">
                    <button type="submit" class="btn btn-primary">Submit feedback</button>
                </div>
            </form>

            {% if business_name %}
                <div class="brand-card-footer">
                    {{ business_name }}
                </div>
            {% endif %}

        </div>
    </div>
</body>
</html>
