services:
  app:
    build: .
    container_name: review-app
    # ports:
    #   - "8000:8000"   # use this if you want to access app directly (no nginx)
    expose:
      - "8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  nginx:
    image: nginx:1.28-alpine
    container_name: review-nginx
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    restart: unless-stopped